- id: r2pyspark_full_script_010
  inputs:
    prompt: |
      Convert this complete R script to a PySpark Databricks notebook. The data tables are in the catalog `analytics` schema `sales`:
      ```r
      library(dplyr)
      library(lubridate)

      # Read data
      orders <- read.csv("data/orders.csv")
      products <- read.csv("data/products.csv")

      # Join and transform
      report <- orders %>%
        left_join(products, by = "product_id") %>%
        filter(order_date >= "2024-01-01") %>%
        mutate(
          order_month = floor_date(as.Date(order_date), "month"),
          revenue = quantity * unit_price,
          margin = revenue - (quantity * cost)
        ) %>%
        group_by(order_month, category) %>%
        summarize(
          total_revenue = sum(revenue),
          total_margin = sum(margin),
          order_count = n(),
          avg_order_value = mean(revenue),
          .groups = "drop"
        ) %>%
        arrange(order_month, desc(total_revenue))

      # Write output
      write.csv(report, "output/monthly_report.csv", row.names = FALSE)
      ```
  outputs:
    response: |
      ```python
      from pyspark.sql import functions as F

      # Read from Unity Catalog
      orders = spark.table("analytics.sales.orders")
      products = spark.table("analytics.sales.products")

      # Join and transform
      report = (
          orders
          .join(products, on="product_id", how="left")
          .filter(F.col("order_date") >= "2024-01-01")
          .withColumn("order_month", F.date_trunc("month", F.col("order_date")))
          .withColumn("revenue", F.col("quantity") * F.col("unit_price"))
          .withColumn("margin", F.col("revenue") - (F.col("quantity") * F.col("cost")))
          .groupBy("order_month", "category")
          .agg(
              F.sum("revenue").alias("total_revenue"),
              F.sum("margin").alias("total_margin"),
              F.count("*").alias("order_count"),
              F.avg("revenue").alias("avg_order_value"),
          )
          .orderBy("order_month", F.col("total_revenue").desc())
      )

      # Write as Delta table
      report.write.mode("overwrite").saveAsTable("analytics.sales.monthly_report")

      display(report)
      ```
    execution_success: true
  expectations:
    expected_facts:
    - read.csv maps to spark.table with Unity Catalog path
    - floor_date maps to F.date_trunc
    - Output uses Delta table via saveAsTable instead of write.csv
    - Uses 3-level namespace analytics.sales for all table references
    - Complete pipeline preserves all transformation logic
    expected_patterns:
    - pattern: from pyspark\.sql import functions as F
      min_count: 1
      description: Must import F
    - pattern: spark\.table\(
      min_count: 2
      description: Must read from Unity Catalog tables
    - pattern: analytics\.sales\.
      min_count: 2
      description: Must use the specified catalog.schema namespace
    - pattern: \.saveAsTable\(
      min_count: 1
      description: Must write as Delta table
    - pattern: F\.date_trunc
      min_count: 1
      description: Must use F.date_trunc for floor_date
    - pattern: display\(
      min_count: 1
      description: Must use display() for notebook output
    guidelines:
    - Must use Unity Catalog tables, not CSV files
    - Must use Delta format for output via saveAsTable
    - Must use the analytics.sales namespace as specified
    - Must preserve all transformation logic from the R script
  metadata:
    category: end_to_end
    difficulty: hard

- id: r2pyspark_case_when_011
  inputs:
    prompt: |
      Convert this R case_when to PySpark:
      ```r
      df <- df %>%
        mutate(
          tier = case_when(
            revenue >= 1000000 ~ "enterprise",
            revenue >= 100000  ~ "mid_market",
            revenue >= 10000   ~ "smb",
            TRUE               ~ "starter"
          ),
          status_label = case_when(
            status == "A" ~ "Active",
            status == "I" ~ "Inactive",
            status == "P" ~ "Pending",
            TRUE          ~ "Unknown"
          )
        )
      ```
  outputs:
    response: |
      ```python
      from pyspark.sql import functions as F

      df = (
          df
          .withColumn("tier",
              F.when(F.col("revenue") >= 1000000, "enterprise")
               .when(F.col("revenue") >= 100000, "mid_market")
               .when(F.col("revenue") >= 10000, "smb")
               .otherwise("starter")
          )
          .withColumn("status_label",
              F.when(F.col("status") == "A", "Active")
               .when(F.col("status") == "I", "Inactive")
               .when(F.col("status") == "P", "Pending")
               .otherwise("Unknown")
          )
      )
      ```
    execution_success: true
  expectations:
    expected_facts:
    - case_when maps to F.when().when().otherwise()
    - R's TRUE ~ default maps to .otherwise()
    - Each condition maps to a .when() call
    - Multiple case_when in one mutate maps to multiple withColumn calls
    expected_patterns:
    - pattern: F\.when\(
      min_count: 2
      description: Must use F.when() for case_when
    - pattern: \.otherwise\(
      min_count: 2
      description: Must use .otherwise() for TRUE ~ default
    - pattern: \.withColumn\(
      min_count: 2
      description: Must use withColumn for each mutated column
    guidelines:
    - TRUE ~ value in case_when must map to .otherwise()
    - Conditions are evaluated in order, same as R
  metadata:
    category: happy_path
    difficulty: easy

- id: r2pyspark_lubridate_012
  inputs:
    prompt: |
      Convert these R lubridate operations to PySpark:
      ```r
      library(lubridate)
      df <- df %>%
        mutate(
          parsed_date = ymd(date_string),
          order_year = year(order_date),
          order_month = month(order_date),
          month_start = floor_date(order_date, "month"),
          days_ago = as.numeric(difftime(today(), order_date, units = "days")),
          next_quarter = order_date + months(3),
          formatted = format(order_date, "%B %Y")
        )
      ```
  outputs:
    response: |
      ```python
      from pyspark.sql import functions as F

      df = (
          df
          .withColumn("parsed_date", F.to_date("date_string", "yyyy-MM-dd"))
          .withColumn("order_year", F.year("order_date"))
          .withColumn("order_month", F.month("order_date"))
          .withColumn("month_start", F.date_trunc("month", F.col("order_date")))
          .withColumn("days_ago", F.datediff(F.current_date(), F.col("order_date")))
          .withColumn("next_quarter", F.add_months(F.col("order_date"), 3))
          .withColumn("formatted", F.date_format(F.col("order_date"), "MMMM yyyy"))
      )

      display(df)
      ```
    execution_success: true
  expectations:
    expected_facts:
    - ymd maps to F.to_date with yyyy-MM-dd format
    - year() maps to F.year()
    - month() maps to F.month()
    - floor_date maps to F.date_trunc
    - difftime with days maps to F.datediff
    - months(3) addition maps to F.add_months
    - format uses Java date format strings (MMMM not %B)
    expected_patterns:
    - pattern: F\.to_date
      min_count: 1
      description: Must use F.to_date for ymd
    - pattern: F\.year\(
      min_count: 1
      description: Must use F.year()
    - pattern: F\.date_trunc
      min_count: 1
      description: Must use F.date_trunc for floor_date
    - pattern: F\.datediff
      min_count: 1
      description: Must use F.datediff for difftime
    - pattern: F\.add_months
      min_count: 1
      description: Must use F.add_months for date addition
    - pattern: F\.date_format
      min_count: 1
      description: Must use F.date_format for format()
    guidelines:
    - Date format strings use Java patterns (yyyy-MM-dd), not R patterns (%Y-%m-%d)
    - Must use F.current_date() instead of today()
  metadata:
    category: happy_path
    difficulty: medium
