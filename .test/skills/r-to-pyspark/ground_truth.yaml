  metadata:
    category: happy_path
    difficulty: easy

- id: r2pyspark_read_csv_005
  inputs:
    prompt: |
      Convert this R code to PySpark on Databricks. The CSV file has been uploaded to a Unity Catalog volume.
      ```r
      library(readr)
      sales <- read_csv("data/sales_2024.csv",
                        col_types = cols(
                          id = col_integer(),
                          product = col_character(),
                          amount = col_double(),
                          sale_date = col_date()
                        ))
      ```
  outputs:
    response: |
      ```python
      from pyspark.sql.types import StructType, StructField, IntegerType, StringType, DoubleType, DateType

      schema = StructType([
          StructField("id", IntegerType(), True),
          StructField("product", StringType(), True),
          StructField("amount", DoubleType(), True),
          StructField("sale_date", DateType(), True),
      ])

      sales = spark.read.csv(
          "/Volumes/catalog/schema/volume/sales_2024.csv",
          header=True,
          schema=schema,
      )

      display(sales)
      ```
    execution_success: true
  expectations:
    expected_facts:
    - read_csv maps to spark.read.csv
    - col_types with explicit types maps to StructType schema
    - File path uses /Volumes/ for Unity Catalog volumes
    - col_integer maps to IntegerType, col_character to StringType, col_double to DoubleType, col_date to DateType
    expected_patterns:
    - pattern: spark\.read\.csv
      min_count: 1
      description: Must use spark.read.csv
    - pattern: /Volumes/
      min_count: 1
      description: Must use Volumes path for file location
    - pattern: StructType
      min_count: 1
      description: Should define explicit schema
    guidelines:
    - Must use Unity Catalog Volume path, not local filesystem
    - Explicit schema is preferred over inferSchema for production code
  metadata:
    category: happy_path
    difficulty: easy

- id: r2pyspark_ggplot_006
  inputs:
    prompt: |
      Convert this R ggplot2 visualization code to PySpark that works in a Databricks notebook. Use matplotlib as the plotting library.
      ```r
      library(ggplot2)
      ggplot(monthly_revenue, aes(x = month, y = revenue, color = region)) +
        geom_line(linewidth = 1) +
        geom_point(size = 3) +
        labs(title = "Monthly Revenue by Region",
             x = "Month",
             y = "Revenue ($)") +
        theme_minimal()
      ```
  outputs:
    response: |
      ```python
      import matplotlib.pyplot as plt

      pdf = monthly_revenue.toPandas()

      fig, ax = plt.subplots(figsize=(12, 6))
      for region in pdf["region"].unique():
          region_data = pdf[pdf["region"] == region].sort_values("month")
          ax.plot(region_data["month"], region_data["revenue"], marker="o", markersize=6, linewidth=1.5, label=region)

      ax.set_title("Monthly Revenue by Region")
      ax.set_xlabel("Month")
      ax.set_ylabel("Revenue ($)")
      ax.legend()
      ax.grid(True, alpha=0.3)
      plt.tight_layout()
      display(fig)
      ```
    execution_success: true
  expectations:
    expected_facts:
    - ggplot2 visualization should be converted to matplotlib
    - The Spark DataFrame must be converted to pandas before plotting
    - Must use display() to render the plot in a Databricks notebook
    - geom_line maps to a line plot and geom_point maps to markers
    - Title and axis labels from labs() must be preserved
    expected_patterns:
    - pattern: matplotlib
      min_count: 1
      description: Must use matplotlib for visualization
    - pattern: display\(
      min_count: 1
      description: Must use display() for Databricks rendering
    - pattern: toPandas\(\)
      min_count: 1
      description: Must convert DataFrame to pandas for plotting
    - pattern: plot\(
      min_count: 1
      description: Must produce a plot call
    guidelines:
    - Must use matplotlib as the plotting library
    - Must use display() to render in Databricks notebooks, not plt.show()
    - Must convert Spark DataFrame to pandas with toPandas() before plotting
    - Must preserve the title and axis labels from the R code
    - geom_line should map to a line plot, geom_point to markers
  metadata:
    category: happy_path
    difficulty: medium

- id: r2pyspark_stats_007
  inputs:
    prompt: |
      Convert these R statistical operations to PySpark:
      ```r
      stats <- df %>%
        group_by(category) %>%
        summarize(
          avg_amount = mean(amount),
          std_dev = sd(amount),
          correlation = cor(price, quantity),
          q95 = quantile(amount, 0.95),
          median_val = median(amount)
        )
      ```
  outputs:
    response: |
      ```python
      from pyspark.sql import functions as F

      stats = (
          df
          .groupBy("category")
          .agg(
              F.avg("amount").alias("avg_amount"),
              F.stddev("amount").alias("std_dev"),
              F.corr("price", "quantity").alias("correlation"),
              F.percentile_approx("amount", 0.95).alias("q95"),
              F.percentile_approx("amount", 0.5).alias("median_val"),
          )
      )

      display(stats)
      ```
    execution_success: true
  expectations:
    expected_facts:
    - sd() maps to F.stddev()
    - cor() maps to F.corr()
    - quantile maps to F.percentile_approx
    - median maps to F.percentile_approx with 0.5
    expected_patterns:
    - pattern: F\.stddev\(
      min_count: 1
      description: Must use F.stddev for sd()
    - pattern: F\.corr\(
      min_count: 1
      description: Must use F.corr for cor()
    - pattern: percentile
      min_count: 1
      description: Must use percentile function for quantile/median
    guidelines:
    - Must use native PySpark aggregate functions, not UDFs
    - F.percentile_approx is the standard approach for quantile and median
  metadata:
    category: happy_path
    difficulty: medium

