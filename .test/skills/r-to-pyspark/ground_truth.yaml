- id: r2pyspark_dplyr_chain_001
  inputs:
    prompt: |
      Convert this R dplyr code to PySpark:
      ```r
      library(dplyr)
      result <- sales_df %>%
        filter(status == "completed", amount > 50) %>%
        select(order_id, customer_id, amount, region) %>%
        mutate(amount_with_tax = amount * 1.08) %>%
        arrange(desc(amount_with_tax))
      ```
  outputs:
    response: |
      ```python
      from pyspark.sql import functions as F

      result = (
          sales_df
          .filter((F.col("status") == "completed") & (F.col("amount") > 50))
          .select("order_id", "customer_id", "amount", "region")
          .withColumn("amount_with_tax", F.col("amount") * 1.08)
          .orderBy(F.col("amount_with_tax").desc())
      )

      display(result)
      ```
    execution_success: true
  expectations:
    expected_facts:
    - Pipe operator maps to method chaining
    - filter with multiple conditions uses & operator with parentheses
    - mutate maps to withColumn
    - arrange(desc()) maps to orderBy with .desc()
    expected_patterns:
    - pattern: from pyspark\.sql import functions as F
      min_count: 1
      description: Must import pyspark.sql.functions as F
    - pattern: \.filter\(
      min_count: 1
      description: Must use .filter() method
    - pattern: \.withColumn\(
      min_count: 1
      description: Must use .withColumn() for mutate
    - pattern: \.orderBy\(
      min_count: 1
      description: Must use .orderBy() for arrange
    - pattern: F\.col\(
      min_count: 1
      description: Must use F.col() for column references
    guidelines:
    - Must use PySpark DataFrame API, not pandas
    - Must use F.col() style column references
    - Filter conditions must have parentheses around each condition with & or |
  metadata:
    category: happy_path
    difficulty: easy

- id: r2pyspark_group_summarize_002
  inputs:
    prompt: |
      Convert this R code to PySpark:
      ```r
      summary <- orders %>%
        group_by(department, year) %>%
        summarize(
          total_sales = sum(amount, na.rm = TRUE),
          avg_sales = mean(amount, na.rm = TRUE),
          num_orders = n(),
          unique_customers = n_distinct(customer_id),
          .groups = "drop"
        )
      ```
  outputs:
    response: |
      ```python
      from pyspark.sql import functions as F

      summary = (
          orders
          .groupBy("department", "year")
          .agg(
              F.sum("amount").alias("total_sales"),
              F.avg("amount").alias("avg_sales"),
              F.count("*").alias("num_orders"),
              F.countDistinct("customer_id").alias("unique_customers"),
          )
      )

      display(summary)
      ```
    execution_success: true
  expectations:
    expected_facts:
    - group_by maps to groupBy
    - summarize maps to .agg()
    - n() maps to F.count("*")
    - n_distinct maps to F.countDistinct
    - PySpark ignores nulls by default so na.rm=TRUE is not needed
    expected_patterns:
    - pattern: \.groupBy\(
      min_count: 1
      description: Must use .groupBy()
    - pattern: \.agg\(
      min_count: 1
      description: Must use .agg() for summarize
    - pattern: F\.sum\(
      min_count: 1
      description: Must use F.sum()
    - pattern: F\.avg\(
      min_count: 1
      description: Must use F.avg() for mean
    - pattern: F\.count
      min_count: 1
      description: Must use F.count for n()
    - pattern: \.alias\(
      min_count: 1
      description: Must use .alias() to name aggregated columns
    guidelines:
    - PySpark aggregation functions ignore nulls by default
    - Must use .alias() to name aggregated columns
  metadata:
    category: happy_path
    difficulty: easy

- id: r2pyspark_join_window_003
  inputs:
    prompt: |
      Convert this R code to PySpark:
      ```r
      result <- orders %>%
        left_join(customers, by = "customer_id") %>%
        group_by(customer_id) %>%
        arrange(order_date) %>%
        mutate(
          order_rank = row_number(),
          prev_order_amount = lag(amount, 1)
        ) %>%
        ungroup() %>%
        filter(order_rank <= 5)
      ```
  outputs:
    response: |
      ```python
      from pyspark.sql import functions as F
      from pyspark.sql.window import Window

      w = Window.partitionBy("customer_id").orderBy("order_date")

      result = (
          orders
          .join(customers, on="customer_id", how="left")
          .withColumn("order_rank", F.row_number().over(w))
          .withColumn("prev_order_amount", F.lag("amount", 1).over(w))
          .filter(F.col("order_rank") <= 5)
      )

      display(result)
      ```
    execution_success: true
  expectations:
    expected_facts:
    - left_join maps to .join() with how="left"
    - Grouped mutate with row_number/lag requires Window specification
    - group_by in window context maps to Window.partitionBy
    - arrange in window context maps to .orderBy in Window spec
    expected_patterns:
    - pattern: Window\.partitionBy
      min_count: 1
      description: Must use Window.partitionBy for grouped window ops
    - pattern: \.join\(
      min_count: 1
      description: Must use .join() for left_join
    - pattern: F\.row_number\(\)\.over
      min_count: 1
      description: Must use F.row_number().over(w)
    - pattern: F\.lag\(
      min_count: 1
      description: Must use F.lag() for lag
    - pattern: from pyspark\.sql\.window import Window
      min_count: 1
      description: Must import Window
    guidelines:
    - Window functions require explicit Window spec with partitionBy and orderBy
    - Must import Window from pyspark.sql.window
  metadata:
    category: happy_path
    difficulty: medium

